version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: educational-companion-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      - N8N_LOG_LEVEL=${LOG_LEVEL:-info}
      - N8N_METRICS=true
      - N8N_DIAGNOSTICS_ENABLED=false
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Discord Configuration  
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      # Google Drive Configuration
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_DRIVE_NOTES_FOLDER_ID=${GOOGLE_DRIVE_NOTES_FOLDER_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      # Google Sheets Configuration
      - GOOGLE_SHEETS_CONVERSATION_LOG_ID=${GOOGLE_SHEETS_CONVERSATION_LOG_ID}
      # Notion Configuration
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows:ro
      - ./config:/home/node/.n8n/config:ro
    depends_on:
      - postgres
    networks:
      - educational-companion

  postgres:
    image: postgres:15-alpine
    container_name: educational-companion-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - POSTGRES_NON_ROOT_USER=n8n
      - POSTGRES_NON_ROOT_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - educational-companion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: educational-companion-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - educational-companion
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local  
  redis_data:
    driver: local

networks:
  educational-companion:
    driver: bridge